name: Validate guestbook entry

on:
  pull_request:
    branches:
      - "**"
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  validate_pr:
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate entries change
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          python3 --version
          python3 scripts/validate_entries.py

      - name: Generate README (auto-fix in PR)
        run: |
          python3 scripts/generate_readme.py
          if ! git diff --quiet -- README.md; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "chore: auto-generate README"
            git push
          fi

      - name: Verify README is up to date
        run: |
          python3 scripts/generate_readme.py --check

  sync_main_readme:
    # Only run this on push to main. Don't run, when it's the bot pushing; prevent loop.
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate README (auto-fix on main)
        run: |
          python3 --version
          python3 scripts/generate_readme.py
          if ! git diff --quiet -- README.md; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "chore: auto-generate README"
            git push
          fi

