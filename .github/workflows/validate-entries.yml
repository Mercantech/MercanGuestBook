name: Validate and generate guestbook entry

on:
  pull_request:
    branches:
      - "**"
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  # Run this on opened PRs
  validate_and_generate_pr:
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}

      - name: Validate entries change
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          python3 --version
          python3 scripts/validate_entries.py

      - name: Generate README (auto-fix in PR)
        env:
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
        run: |
          python3 scripts/generate_readme.py
          if ! git diff --quiet -- README.md; then
            if [ "$HEAD_REPO" != "${{ github.repository }}" ]; then
              echo "::error::README.md er ikke opdateret. Kør \`python3 scripts/generate_readme.py\` lokalt og commit ændringen (auto-push virker ikke på PRs fra forks)."
              exit 1
            fi
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "chore: auto-generate README"
            git push
          fi

      - name: Verify README is up to date
        run: |
          python3 scripts/generate_readme.py --check

  sync_main_readme:
    # Run this on push to main.
    # Don't run, when it's the bot pushing; prevent loop.
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate README (auto-fix on main)
        run: |
          python3 --version
          python3 scripts/generate_readme.py
          if ! git diff --quiet -- README.md; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "chore: auto-generate README"
            git push
          fi

